name: E2E Test Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Contract Tests (fail fast gate)
  # ─────────────────────────────────────────
  contract-tests:
    name: Contract Tests - Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Run contract tests
        run: |
          ./gradlew :e2e-api-tests:clean :e2e-api-tests:test \
            -Dtest.suite=contract \
            --no-daemon
        env:
          BASE_URL:     ${{ secrets.BASE_URL }}
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}

      - name: Upload contract test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: |
            e2e-api-tests/build/reports/tests/
            e2e-api-tests/build/test-results/

      - name: Publish contract test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Contract Tests
          path: e2e-api-tests/build/test-results/**/*.xml
          reporter: java-junit

  # ─────────────────────────────────────────
  # JOB 2 — API Functional Tests
  # Only runs if contracts pass
  # ─────────────────────────────────────────
  api-functional-tests:
    name: API Functional Tests - REST Assured
    runs-on: ubuntu-latest
    needs: contract-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Gradle permissions
        run: chmod +x gradlew

      - name: Run functional API tests
        run: |
          ./gradlew :e2e-api-tests:clean :e2e-api-tests:test \
            -Dtest.suite=functional \
            --no-daemon
        env:
          BASE_URL:     ${{ secrets.BASE_URL }}
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}

      - name: Upload functional test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-functional-results
          path: |
            e2e-api-tests/build/reports/tests/
            e2e-api-tests/build/test-results/

      - name: Publish functional test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API Functional Tests
          path: e2e-api-tests/build/test-results/**/*.xml
          reporter: java-junit

  # ─────────────────────────────────────────
  # JOB 3 — UI Tests
  # Runs in parallel with API functional tests
  # ─────────────────────────────────────────
  ui-tests:
    name: UI Tests - Playwright
    runs-on: ubuntu-latest
    needs: contract-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: e2e-ui-tests/package-lock.json

      - name: Install dependencies
        run: |
          cd e2e-ui-tests
          npm ci

      - name: Install Playwright browsers
        run: |
          cd e2e-ui-tests
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          cd e2e-ui-tests
          npx playwright test --reporter=junit,html
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            e2e-ui-tests/playwright-report/
            e2e-ui-tests/test-results/

      - name: Publish Playwright results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright UI Tests
          path: e2e-ui-tests/test-results/*.xml
          reporter: java-junit

  # ─────────────────────────────────────────
  # JOB 4 — Performance Tests
  # Only on nightly schedule
  # ─────────────────────────────────────────
  performance-tests:
    name: Performance Tests - k6
    runs-on: ubuntu-latest
    needs: [ api-functional-tests, ui-tests ]
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6

      - name: Run k6 performance tests
        run: |
          k6 run \
            --summary-trend-stats="min,avg,med,p(95),p(99),max" \
            --out json=performance/results/k6-results.json \
            performance/booking-journeys.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-performance-results
          path: performance/results/k6-results.json